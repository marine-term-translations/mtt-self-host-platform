<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{subject}}</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    .wrapper {
      width: 100%;
      background-color: #f3f4f6;
      padding: 24px 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .header {
      background: linear-gradient(135deg, #0e7490 0%, #0891b2 100%);
      padding: 32px;
      text-align: center;
    }
    .logo {
      color: #ffffff;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin: 0;
    }
    .content {
      padding: 32px;
      line-height: 1.6;
    }
    .footer {
      background-color: #f9fafb;
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      border-top: 1px solid #f3f4f6;
    }
    .footer a {
      color: #0891b2;
      text-decoration: none;
    }
    .btn {
      display: inline-block;
      background-color: #0891b2;
      color: #ffffff !important;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 600;
      margin-top: 16px;
      text-align: center;
    }
    .btn:hover {
      background-color: #0e7490;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <h1 class="logo">Marine Term Translations</h1>
      </div>
      <div class="content">
        {{content}}
      </div>
      <div class="footer">
        <p>This is an automated message from the Marine Term Translations (MTT) Platform.</p>
        <p>
          To manage your email preferences or opt out, please visit 
          <a href="{{unsubscribe_link}}">your Settings page</a>.
        </p>
        <p>&copy; 2026 Marine Term Translations. All rights reserved.</p>
      </div>
    </div>
  </div>
</body>
</html>
